<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Catalog</title>
  <base href="{{BASE_PATH}}/">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">&#9776;</button>
      <h1 class="site-title">API Catalog</h1>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search APIs and types..." autocomplete="off" spellcheck="false">
      </div>
      <span class="stats" id="stats"></span>
    </div>
  </header>

  <nav class="breadcrumb-bar" id="breadcrumb-bar"></nav>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-tree" id="sidebar-tree" role="tree" aria-label="API navigation"></nav>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <section class="content-pane" id="content-pane">
      <div id="loading" class="loading">Loading catalog...</div>
      <div id="directory" class="directory-view hidden"></div>
      <div id="search-results" class="search-results hidden"></div>
      <div id="content" class="content-body hidden"></div>
    </section>
  </div>

  <footer class="site-footer">
    <span>Generated by <a href="https://github.com/infobloxopen/apx" target="_blank" rel="noopener">APX</a></span>
    <span id="generated-at"></span>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
