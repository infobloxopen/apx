<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Catalog</title>
  <base href="{{BASE_PATH}}/">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">&#9776;</button>
      <h1 class="site-title">API Catalog</h1>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search APIs and types..." autocomplete="off" spellcheck="false">
      </div>
      <span class="stats" id="stats"></span>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-tree" id="sidebar-tree" role="tree" aria-label="API navigation"></nav>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <section class="content-pane" id="content-pane">
      <div id="loading" class="loading">Loading catalog...</div>
      <div id="welcome" class="welcome hidden">
        <h2>API Catalog</h2>
        <p class="welcome-tagline">Browse, search, and explore your organization's API surface.</p>
        <div class="welcome-links">
          <a href="https://github.com/infobloxopen/apx" target="_blank" rel="noopener">
            <span class="welcome-link-icon">&#9733;</span>
            GitHub
          </a>
          <a href="https://infobloxopen.github.io/apx/" target="_blank" rel="noopener">
            <span class="welcome-link-icon">&#128214;</span>
            Documentation
          </a>
          <a href="https://infobloxopen.github.io/apx/canonical-repo/catalog-site/" target="_blank" rel="noopener">
            <span class="welcome-link-icon">&#128736;</span>
            Catalog Site Guide
          </a>
        </div>
        <p class="welcome-hint">Use the search bar above or browse the tree on the left to get started.</p>
      </div>
      <div id="search-results" class="search-results hidden"></div>
      <div id="content" class="content-body hidden"></div>
    </section>
  </div>

  <footer class="site-footer">
    <span>Generated by <a href="https://github.com/infobloxopen/apx" target="_blank" rel="noopener">APX</a></span>
    <span id="generated-at"></span>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
