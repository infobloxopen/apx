<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Catalog</title>
  <base href="{{BASE_PATH}}/">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <h1 class="site-title">API Catalog</h1>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search APIs..." autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="filters">
      <select id="filter-format">
        <option value="">All Formats</option>
      </select>
      <select id="filter-lifecycle">
        <option value="">All Lifecycles</option>
      </select>
      <select id="filter-domain">
        <option value="">All Domains</option>
      </select>
      <select id="filter-origin">
        <option value="">All Origins</option>
        <option value="first-party">First-party</option>
        <option value="external">External</option>
        <option value="forked">Forked</option>
      </select>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <main>
    <div id="api-list" class="api-grid"></div>
    <div id="api-detail" class="detail-panel hidden"></div>
    <div id="loading" class="loading">Loading catalog...</div>
    <div id="empty" class="empty hidden">No APIs match your search.</div>
  </main>

  <footer class="site-footer">
    <span>Generated by <a href="https://github.com/infobloxopen/apx" target="_blank" rel="noopener">APX</a></span>
    <span id="generated-at"></span>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
