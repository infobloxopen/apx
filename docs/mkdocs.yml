    - Canonical PR: releasing/canonical-pr.md
    - Tagging Strategy: releasing/tagging-strategy.md
    - Release Guardrails: releasing/release-guardrails.md
    - Validation: releasing/validation.md
  - CLI Reference:
    - cli-reference/index.md
    - Core Commands: cli-reference/core-commands.md
    - Dependency Commands: cli-reference/dependency-commands.md
    - Release Commands: cli-reference/release-commands.md
    - Validation Commands: cli-reference/validation-commands.md
    - Utility Commands: cli-reference/utility-commands.md
    - External Commands: cli-reference/external-commands.md
    - Configuration: cli-reference/configuration.md
    - Global Options: cli-reference/global-options.md
  - Troubleshooting:
    - troubleshooting/index.md
    - Common Errors: troubleshooting/common-errors.md
    - Buf Issues: troubleshooting/buf-issues.md
    - Versioning Problems: troubleshooting/versioning-problems.md
    - Release Failures: troubleshooting/release-failures.md
