name: "Setup APX"
description: "Install the APX CLI from GitHub Releases"
author: "Infoblox"

branding:
  icon: "package"
  color: "blue"

inputs:
  version:
    description: >
      APX version to install. Use "latest" for the most recent stable
      release, "edge" for the latest main-branch build, or pin to a
      specific version like "1.2.3" (no "v" prefix).
    required: false
    default: "edge"
  token:
    description: >
      GitHub token for downloading release assets. Defaults to the
      built-in GITHUB_TOKEN. Only needed when hitting API rate limits.
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: "The version of APX that was installed"
    value: ${{ steps.install.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Install APX
      id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        # ── Resolve version ──────────────────────────────────────────────
        REPO="infobloxopen/apx"
        if [[ "${INPUT_VERSION}" == "latest" ]]; then
          VERSION=$(curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/latest" \
            | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
          TAG="v${VERSION}"
        elif [[ "${INPUT_VERSION}" == "edge" ]]; then
          VERSION="edge"
          TAG="edge"
        else
          VERSION="${INPUT_VERSION#v}"
          TAG="v${VERSION}"
        fi
        echo "Installing APX ${VERSION}..."

        # ── Detect OS / arch ─────────────────────────────────────────────
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
          arm64)   ARCH="arm64" ;;
        esac

        # ── Download + extract ───────────────────────────────────────────
        ARCHIVE="apx_${VERSION}_${OS}_${ARCH}.tar.gz"
        URL="https://github.com/${REPO}/releases/download/${TAG}/${ARCHIVE}"
        CHECKSUM_URL="https://github.com/${REPO}/releases/download/${TAG}/checksums.txt"

        TMPDIR="$(mktemp -d)"
        trap 'rm -rf "${TMPDIR}"' EXIT

        echo "Downloading ${URL}..."
        curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
          -o "${TMPDIR}/${ARCHIVE}" -L "${URL}"

        echo "Downloading checksums..."
        curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
          -o "${TMPDIR}/checksums.txt" -L "${CHECKSUM_URL}"

        # Verify checksum
        EXPECTED=$(grep "${ARCHIVE}" "${TMPDIR}/checksums.txt" | awk '{print $1}')
        if [[ -n "${EXPECTED}" ]]; then
          ACTUAL=$(sha256sum "${TMPDIR}/${ARCHIVE}" | awk '{print $1}')
          if [[ "${EXPECTED}" != "${ACTUAL}" ]]; then
            echo "::error::Checksum mismatch for ${ARCHIVE}: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi
          echo "Checksum verified."
        fi

        # Extract and install
        tar -xzf "${TMPDIR}/${ARCHIVE}" -C "${TMPDIR}" apx
        INSTALL_DIR="${HOME}/.local/bin"
        mkdir -p "${INSTALL_DIR}"
        mv "${TMPDIR}/apx" "${INSTALL_DIR}/apx"
        chmod +x "${INSTALL_DIR}/apx"

        # Ensure it's on PATH
        echo "${INSTALL_DIR}" >> "${GITHUB_PATH}"

        echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
        echo "APX v${VERSION} installed to ${INSTALL_DIR}/apx"

    - name: Install toolchain dependencies
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        CONFIG="apx.yaml"
        if [[ ! -f "${CONFIG}" ]]; then
          echo "No apx.yaml found, skipping toolchain install"
          exit 0
        fi

        INSTALL_DIR="${HOME}/.local/bin"
        mkdir -p "${INSTALL_DIR}"
        export PATH="${INSTALL_DIR}:${PATH}"

        # ── Detect OS / arch ───────────────────────────────────────────
        OS="$(uname -s)"   # Darwin or Linux
        ARCH="$(uname -m)" # x86_64 or aarch64 or arm64

        # ── buf ────────────────────────────────────────────────────────
        BUF_VERSION=$(grep -A1 '^\s*buf:' "${CONFIG}" | grep 'version:' | sed 's/.*version:\s*//' | tr -d '[:space:]"'"'" || true)
        if [[ -n "${BUF_VERSION}" ]]; then
          if command -v buf &>/dev/null; then
            echo "buf already available: $(buf --version 2>&1 || true)"
          else
            echo "Installing buf ${BUF_VERSION}..."
            URL="https://github.com/bufbuild/buf/releases/download/${BUF_VERSION}/buf-${OS}-${ARCH}"
            curl -fsSL -o "${INSTALL_DIR}/buf" -L "${URL}"
            chmod +x "${INSTALL_DIR}/buf"
            echo "buf ${BUF_VERSION} installed"
          fi
        fi

        # ── oasdiff ───────────────────────────────────────────────────
        OASDIFF_VERSION=$(grep -A1 '^\s*oasdiff:' "${CONFIG}" | grep 'version:' | sed 's/.*version:\s*//' | tr -d '[:space:]"'"'" || true)
        if [[ -n "${OASDIFF_VERSION}" ]]; then
          if command -v oasdiff &>/dev/null; then
            echo "oasdiff already available"
          else
            echo "Installing oasdiff ${OASDIFF_VERSION}..."
            OASDIFF_V="${OASDIFF_VERSION#v}"
            OASDIFF_OS="$(echo "${OS}" | tr '[:upper:]' '[:lower:]')"
            case "${ARCH}" in
              x86_64)  OASDIFF_ARCH="amd64" ;;
              aarch64|arm64) OASDIFF_ARCH="arm64" ;;
              *) OASDIFF_ARCH="${ARCH}" ;;
            esac
            URL="https://github.com/Tufin/oasdiff/releases/download/${OASDIFF_VERSION}/oasdiff_${OASDIFF_V}_${OASDIFF_OS}_${OASDIFF_ARCH}.tar.gz"
            TMPDIR="$(mktemp -d)"
            curl -fsSL -o "${TMPDIR}/oasdiff.tar.gz" -L "${URL}"
            tar -xzf "${TMPDIR}/oasdiff.tar.gz" -C "${TMPDIR}" oasdiff
            mv "${TMPDIR}/oasdiff" "${INSTALL_DIR}/oasdiff"
            chmod +x "${INSTALL_DIR}/oasdiff"
            rm -rf "${TMPDIR}"
            echo "oasdiff ${OASDIFF_VERSION} installed"
          fi
        fi
