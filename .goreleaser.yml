project_name: apx
version: 2

before:
  hooks:
    - go mod tidy
    - sh -c "go test ./cmd/... $(go list ./internal/... | grep -v /validator | tr '\n' ' ')"
    - sh -c "mkdir -p completions && go run ./cmd/apx completion bash > completions/apx.bash && go run ./cmd/apx completion zsh > completions/apx.zsh && go run ./cmd/apx completion fish > completions/apx.fish"

builds:
  - id: apx
    binary: apx
    main: ./cmd/apx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: apx
    ids:
      - apx
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: tar.gz
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - README.md
      - LICENSE
      - apx.example.yaml
      - completions/*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: apx
    repository:
      owner: infobloxopen
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/infobloxopen/apx
    description: "API Publishing eXperience CLI"
    completions:
      bash: completions/apx.bash
      zsh: completions/apx.zsh
      fish: completions/apx.fish
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/apx"]
          end
    caveats: |
      The binary is not signed by Apple. On first run macOS may show a
      security warning. The post-install hook attempts to clear the
      quarantine flag automatically. If you still see the warning, run:
        xattr -dr com.apple.quarantine $(brew --caskroom)/apx

scoops:
  - name: apx
    repository:
      owner: infobloxopen
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: https://github.com/infobloxopen/apx
    description: "API Publishing eXperience CLI"
    license: Apache-2.0
    skip_upload: auto

nfpms:
  - id: apx
    package_name: apx
    homepage: https://github.com/infobloxopen/apx
    description: "API Publishing eXperience CLI"
    maintainer: Infoblox <info@infoblox.com>
    license: Apache-2.0
    vendor: Infoblox
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: apx.example.yaml
        dst: /etc/apx/apx.example.yaml
        type: config|noreplace
      - src: completions/apx.bash
        dst: /usr/share/bash-completion/completions/apx
      - src: completions/apx.zsh
        dst: /usr/share/zsh/vendor-completions/_apx
      - src: completions/apx.fish
        dst: /usr/share/fish/vendor_completions.d/apx.fish

dockers_v2:
  - images:
      - "ghcr.io/infobloxopen/apx"
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - apx.example.yaml
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

release:
  github:
    owner: infobloxopen
    name: apx
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}}-v{{.Version}}"