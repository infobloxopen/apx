# Dependabot configuration.
# Routine version updates (grouped, weekly). Security updates are enabled
# separately at the repository level and open PRs for vulnerable dependencies
# automatically regardless of this file.
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/docs"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    groups:
      pip:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
